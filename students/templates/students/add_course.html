{% extends "base.html" %}

{% block content %}


<div class="d-flex justify-content-between align-items-center mb-3">
    
    <h1>Add Course</h1>

    <a href="/course_list/" class="btn btn-primary">
        View Course List
    </a>

</div>
{% if success %}
<div class="alert alert-success">
    Student added successfully!
</div>
{% endif %}

<form method="POST">

    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit" class="btn btn-success">
        Save Course
    </button>

</form>

{% endblock %}
