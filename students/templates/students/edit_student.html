{% extends "base.html" %}

{% block content %}

<h2 class="mb-4">Edit Student</h2>

<form method="POST"  enctype="multipart/form-data">

    {% csrf_token %}

     {{ form.as_p }}


    {% if form.instance.photo %}

<div class="mb-3">

    <label class="form-label">
        Current Photo
    </label>

    <br>

    <img src="{{ form.instance.photo.url }}"
         width="150"
         class="img-thumbnail">

</div>

{% endif %}
   

    <button type="submit" class="btn btn-primary">
        Update Student
    </button>

</form>

{% endblock %}
